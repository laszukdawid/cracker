name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Python 3.14 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-suffix: py3.14-${{ matrix.os }}
      - name: Install Qt runtime dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes libpulse-mainloop-glib0 libegl1 \
            libxcb-cursor0 libxcb-icccm4 libxcb-keysyms1 libxcb-randr0 \
            libxcb-shape0 libxcb-xinerama0 libxkbcommon-x11-0 xvfb xauth
      - run: uv sync --frozen --extra test
      - name: Run tests under Xvfb
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum env QT_QPA_PLATFORM=xcb uv run --frozen pytest
      - name: Run tests
        if: runner.os != 'Linux'
        run: uv run --frozen pytest

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - run: uv sync --frozen --extra dev --extra test
      - run: uv run --frozen ruff check --output-format=github cracker scripts
      - run: uv run --frozen ruff format --check cracker scripts
      - run: uv run --frozen ty check --output-format=github
      - run: uv run --frozen python -m compileall -q cracker

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - run: uv lock --check
      - run: uv build
      - run: uv run --frozen python scripts/check_wheel.py
